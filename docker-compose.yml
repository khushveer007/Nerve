services:
  db:
    image: pgvector/pgvector:pg16
    container_name: nerve-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_DIR:-./.local/postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nerve

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nerve-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_BASE_URL: ${APP_BASE_URL}
      API_PORT: ${API_PORT:-3001}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-super@parul.ac.in}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@parul.ac.in}
      ASSISTANT_RAG_ENABLED: ${ASSISTANT_RAG_ENABLED:-true}
      ASSISTANT_QUERY_RESULT_LIMIT: ${ASSISTANT_QUERY_RESULT_LIMIT:-5}
      ASSISTANT_EMBEDDING_URL: ${ASSISTANT_EMBEDDING_URL:-}
      ASSISTANT_EMBEDDING_API_KEY: ${ASSISTANT_EMBEDDING_API_KEY:-}
      ASSISTANT_EMBEDDING_API_HEADER: ${ASSISTANT_EMBEDDING_API_HEADER:-Authorization}
      ASSISTANT_EMBEDDING_AUTH_SCHEME: ${ASSISTANT_EMBEDDING_AUTH_SCHEME:-Bearer}
      ASSISTANT_EMBEDDING_MODEL: ${ASSISTANT_EMBEDDING_MODEL:-text-embedding-3-small}
      ASSISTANT_EMBEDDING_DIMENSIONS: ${ASSISTANT_EMBEDDING_DIMENSIONS:-1536}
      ASSISTANT_WORKER_POLL_MS: ${ASSISTANT_WORKER_POLL_MS:-1000}
      ASSISTANT_JOB_MAX_ATTEMPTS: ${ASSISTANT_JOB_MAX_ATTEMPTS:-3}
      ASSISTANT_JOB_RETRY_BASE_MS: ${ASSISTANT_JOB_RETRY_BASE_MS:-15000}
      ASSISTANT_JOB_STALE_LOCK_MS: ${ASSISTANT_JOB_STALE_LOCK_MS:-60000}
    volumes:
      - ${UPLOADS_DIR:-/srv/nerve/data/uploads}:/app/uploads
    ports:
      - "127.0.0.1:${API_PORT:-3001}:${API_PORT:-3001}"
    networks:
      - nerve

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nerve-worker
    restart: unless-stopped
    command: ["npm", "run", "start:worker"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_BASE_URL: ${APP_BASE_URL}
      API_PORT: ${API_PORT:-3001}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-super@parul.ac.in}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      ASSISTANT_RAG_ENABLED: ${ASSISTANT_RAG_ENABLED:-true}
      ASSISTANT_QUERY_RESULT_LIMIT: ${ASSISTANT_QUERY_RESULT_LIMIT:-5}
      ASSISTANT_EMBEDDING_URL: ${ASSISTANT_EMBEDDING_URL:-}
      ASSISTANT_EMBEDDING_API_KEY: ${ASSISTANT_EMBEDDING_API_KEY:-}
      ASSISTANT_EMBEDDING_API_HEADER: ${ASSISTANT_EMBEDDING_API_HEADER:-Authorization}
      ASSISTANT_EMBEDDING_AUTH_SCHEME: ${ASSISTANT_EMBEDDING_AUTH_SCHEME:-Bearer}
      ASSISTANT_EMBEDDING_MODEL: ${ASSISTANT_EMBEDDING_MODEL:-text-embedding-3-small}
      ASSISTANT_EMBEDDING_DIMENSIONS: ${ASSISTANT_EMBEDDING_DIMENSIONS:-1536}
      ASSISTANT_WORKER_POLL_MS: ${ASSISTANT_WORKER_POLL_MS:-1000}
      ASSISTANT_JOB_MAX_ATTEMPTS: ${ASSISTANT_JOB_MAX_ATTEMPTS:-3}
      ASSISTANT_JOB_RETRY_BASE_MS: ${ASSISTANT_JOB_RETRY_BASE_MS:-15000}
      ASSISTANT_JOB_STALE_LOCK_MS: ${ASSISTANT_JOB_STALE_LOCK_MS:-60000}
    networks:
      - nerve

networks:
  nerve:
    driver: bridge
